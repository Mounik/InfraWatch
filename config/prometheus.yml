global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'infrawatch'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/node-exporter.json
        refresh_interval: 5m
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'grafana'
    static_configs:
      - targets: ['localhost:3000']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['localhost:9093']