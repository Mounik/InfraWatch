---
- name: Create node_exporter user
  user:
    name: node_exporter
    shell: /usr/sbin/nologin
    system: yes
    create_home: no

- name: Download Node Exporter
  unarchive:
    src: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz"
    dest: /tmp
    remote_src: yes
    checksum: "{{ node_exporter_checksum }}"
  when: node_exporter_checksum | length > 0

- name: Download Node Exporter (no checksum)
  unarchive:
    src: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz"
    dest: /tmp
    remote_src: yes
  when: node_exporter_checksum | length == 0

- name: Install Node Exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: '0755'
    owner: root
    group: root
    remote_src: yes

- name: Create Node Exporter config directory
  file:
    path: /etc/node_exporter
    state: directory
    mode: '0755'

- name: Deploy Node Exporter config
  template:
    src: config.yml.j2
    dest: /etc/node_exporter/config.yml
  notify: restart node_exporter

- name: Deploy systemd service
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
  notify:
    - reload systemd
    - restart node_exporter

- name: Start and enable Node Exporter
  systemd:
    name: node_exporter
    state: started
    enabled: yes

- name: Register server with Prometheus
  uri:
    url: "http://{{ infrawatch_server }}:8080/api/servers"
    method: POST
    body_format: json
    body:
      hostname: "{{ inventory_hostname }}"
      ip: "{{ ansible_host }}"
      labels: "{{ labels | default({}) }}"
    status_code: 200,201,409
  when: infrawatch_server is defined
  ignore_errors: yes