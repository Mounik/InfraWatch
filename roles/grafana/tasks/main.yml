---
- name: Install dependencies
  apt:
    name:
      - apt-transport-https
      - software-properties-common
      - gnupg
    state: present
    update_cache: yes

- name: Add Grafana GPG key
  apt_key:
    url: https://packages.grafana.com/gpg.key
    state: present

- name: Add Grafana repository
  apt_repository:
    repo: "deb https://packages.grafana.com/oss/deb stable main"
    state: present

- name: Install Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes

- name: Deploy Grafana config
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
  notify: restart grafana

- name: Create dashboards directory
  file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'

- name: Deploy dashboards
  copy:
    src: "{{ item }}"
    dest: /var/lib/grafana/dashboards/
    owner: grafana
    group: grafana
    mode: '0644'
  loop:
    - node-overview.json
    - docker-containers.json
    - ssl-certificates.json
  notify: restart grafana

- name: Configure provisioning
  template:
    src: datasource.yml.j2
    dest: /etc/grafana/provisioning/datasources/datasource.yml
  notify: restart grafana

- name: Configure dashboard provisioning
  template:
    src: dashboards.yml.j2
    dest: /etc/grafana/provisioning/dashboards/dashboards.yml
  notify: restart grafana

- name: Start and enable Grafana
  systemd:
    name: grafana-server
    state: started
    enabled: yes

- name: Wait for Grafana
  wait_for:
    port: 3000
    delay: 5

- name: Change admin password
  uri:
    url: http://localhost:3000/api/user/password
    method: PUT
    user: admin
    password: admin
    body_format: json
    body:
      oldPassword: admin
      newPassword: "{{ grafana_admin_password }}"
    status_code: 200, 401
  ignore_errors: yes