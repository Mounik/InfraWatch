{% extends "base.html" %}

{% block title %}InfraWatch -- Add Server{% endblock %}

{% block content %}
<h2>Add Server</h2>
<div class="card" style="max-width: 600px;">
    <form method="POST" action="/add-server">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="hostname">Hostname</label>
            <input type="text" id="hostname" name="hostname" required pattern="[a-zA-Z0-9][a-zA-Z0-9\-\.]*" placeholder="web01">
        </div>
        <div class="form-group">
            <label for="ip">IP Address</label>
            <input type="text" id="ip" name="ip" required pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$" placeholder="192.168.1.20">
        </div>
        <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role">
                <option value="">-- Select --</option>
                <option value="webserver">Webserver</option>
                <option value="database">Database</option>
                <option value="application">Application</option>
                <option value="cache">Cache</option>
                <option value="loadbalancer">Load Balancer</option>
            </select>
        </div>
        <div class="form-group">
            <label for="env">Environment</label>
            <select id="env" name="env">
                <option value="production">Production</option>
                <option value="staging">Staging</option>
                <option value="development">Development</option>
            </select>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn">Add Server</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
